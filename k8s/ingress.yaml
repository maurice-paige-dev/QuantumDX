apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quantumdx-ingress
  namespace: quantumdx
spec:
  rules:
    - host: quantumdx.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: quantumdx-api
                port:
                  number: 80
