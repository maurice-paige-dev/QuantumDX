apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantumdx-registry-worker
  namespace: quantumdx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quantumdx-registry-worker
  template:
    metadata:
      labels:
        app: quantumdx-registry-worker
    spec:
      containers:
      - name: worker
        image: quantumdx/api:latest
        command: ["python", "-m", "workers.run_worker", "registry"]
        envFrom:
        - configMapRef: {name: quantumdx-config}
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: quantumdx-data
