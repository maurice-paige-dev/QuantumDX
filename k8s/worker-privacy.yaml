apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantumdx-privacy-worker
  namespace: quantumdx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quantumdx-privacy-worker
  template:
    metadata:
      labels:
        app: quantumdx-privacy-worker
    spec:
      containers:
      - name: worker
        image: quantumdx/api:latest
        command: ["python", "-m", "workers.run_worker", "privacy"]
        envFrom:
        - configMapRef: {name: quantumdx-config}
